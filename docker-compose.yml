# このファイルは scripts/gen-compose.py が nodes.json から自動生成する.
# 直接編集しない. ノード変更は nodes.json を編集して再生成すること.
services:
  bitcoind:
    image: polarlightning/bitcoind:27.0
    container_name: lnviz-bitcoind
    restart: unless-stopped
    command:
      - bitcoind
      - -server=1
      - -regtest=1
      - -rpcauth=polaruser:5e5e98c21f5c814568f8b55d83b23c1c$$066b03f92df30b11de8e4b1b1cd5b1b4281aa25205bd57df9be82caf97a05526
      - -rpcbind=0.0.0.0:18443
      - -rpcallowip=0.0.0.0/0
      - -debug=rpc
      - -zmqpubrawblock=tcp://0.0.0.0:28334
      - -zmqpubrawtx=tcp://0.0.0.0:28335
      - -zmqpubhashblock=tcp://0.0.0.0:28336
      - -txindex=1
      - -dnsseed=0
      - -upnp=0
      - -rpcworkqueue=128
      - -fallbackfee=0.0002
    volumes:
      - bitcoind-data:/home/bitcoin/.bitcoin
    ports:
      - "18443:18443"
    networks:
      - lnviz

  lnd-alice:
    image: polarlightning/lnd:0.18.3-beta
    container_name: lnviz-lnd-alice
    restart: unless-stopped
    depends_on:
      - bitcoind
    command:
      - lnd
      - --noseedbackup
      - --trickledelay=5000
      - --alias=alice
      - --externalip=lnd-alice
      - --tlsextradomain=lnd-alice
      - --tlsextradomain=host.docker.internal
      - --listen=0.0.0.0:9735
      - --rpclisten=0.0.0.0:10009
      - --restlisten=0.0.0.0:8080
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind:18443
      - --bitcoind.rpcuser=polaruser
      - --bitcoind.rpcpass=polarpass
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28334
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28335
    volumes:
      - lnd-alice-data:/home/lnd/.lnd
    ports:
      - "10001:10009"
      - "8081:8080"
      - "9735:9735"
    networks:
      - lnviz

  lnd-bob:
    image: polarlightning/lnd:0.18.3-beta
    container_name: lnviz-lnd-bob
    restart: unless-stopped
    depends_on:
      - bitcoind
    command:
      - lnd
      - --noseedbackup
      - --trickledelay=5000
      - --alias=bob
      - --externalip=lnd-bob
      - --tlsextradomain=lnd-bob
      - --tlsextradomain=host.docker.internal
      - --listen=0.0.0.0:9735
      - --rpclisten=0.0.0.0:10009
      - --restlisten=0.0.0.0:8080
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind:18443
      - --bitcoind.rpcuser=polaruser
      - --bitcoind.rpcpass=polarpass
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28334
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28335
    volumes:
      - lnd-bob-data:/home/lnd/.lnd
    ports:
      - "10002:10009"
      - "8082:8080"
      - "9736:9735"
    networks:
      - lnviz

  lnd-carol:
    image: polarlightning/lnd:0.18.3-beta
    container_name: lnviz-lnd-carol
    restart: unless-stopped
    depends_on:
      - bitcoind
    command:
      - lnd
      - --noseedbackup
      - --trickledelay=5000
      - --alias=carol
      - --externalip=lnd-carol
      - --tlsextradomain=lnd-carol
      - --tlsextradomain=host.docker.internal
      - --listen=0.0.0.0:9735
      - --rpclisten=0.0.0.0:10009
      - --restlisten=0.0.0.0:8080
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind:18443
      - --bitcoind.rpcuser=polaruser
      - --bitcoind.rpcpass=polarpass
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28334
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28335
    volumes:
      - lnd-carol-data:/home/lnd/.lnd
    ports:
      - "10003:10009"
      - "8083:8080"
      - "9737:9735"
    networks:
      - lnviz

  lnd-dave:
    image: polarlightning/lnd:0.18.3-beta
    container_name: lnviz-lnd-dave
    restart: unless-stopped
    depends_on:
      - bitcoind
    command:
      - lnd
      - --noseedbackup
      - --trickledelay=5000
      - --alias=dave
      - --externalip=lnd-dave
      - --tlsextradomain=lnd-dave
      - --tlsextradomain=host.docker.internal
      - --listen=0.0.0.0:9735
      - --rpclisten=0.0.0.0:10009
      - --restlisten=0.0.0.0:8080
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind:18443
      - --bitcoind.rpcuser=polaruser
      - --bitcoind.rpcpass=polarpass
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28334
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28335
    volumes:
      - lnd-dave-data:/home/lnd/.lnd
    ports:
      - "10004:10009"
      - "8084:8080"
      - "9738:9735"
    networks:
      - lnviz

  app:
    build: .
    container_name: lnviz-app
    restart: unless-stopped
    depends_on:
      - lnd-alice
      - lnd-bob
      - lnd-carol
      - lnd-dave
    environment:
      LND_ALICE_REST: https://lnd-alice:8080
      LND_ALICE_TLS_CERT_PATH: /lnd/alice/tls.cert
      LND_ALICE_MACAROON_PATH: /lnd/alice/data/chain/bitcoin/regtest/admin.macaroon
      LND_BOB_REST: https://lnd-bob:8080
      LND_BOB_TLS_CERT_PATH: /lnd/bob/tls.cert
      LND_BOB_MACAROON_PATH: /lnd/bob/data/chain/bitcoin/regtest/admin.macaroon
      LND_CAROL_REST: https://lnd-carol:8080
      LND_CAROL_TLS_CERT_PATH: /lnd/carol/tls.cert
      LND_CAROL_MACAROON_PATH: /lnd/carol/data/chain/bitcoin/regtest/admin.macaroon
      LND_DAVE_REST: https://lnd-dave:8080
      LND_DAVE_TLS_CERT_PATH: /lnd/dave/tls.cert
      LND_DAVE_MACAROON_PATH: /lnd/dave/data/chain/bitcoin/regtest/admin.macaroon
      POLL_INTERVAL: "10"
      LOG_LEVEL: INFO
      BITCOIND_RPC_URL: http://bitcoind:18443
      BITCOIND_RPC_USER: polaruser
      BITCOIND_RPC_PASS: polarpass
    volumes:
      - ./data:/app/data
      - lnd-alice-data:/lnd/alice:ro
      - lnd-bob-data:/lnd/bob:ro
      - lnd-carol-data:/lnd/carol:ro
      - lnd-dave-data:/lnd/dave:ro
    ports:
      - "8000:8000"
    networks:
      - lnviz

volumes:
  bitcoind-data:
  lnd-alice-data:
  lnd-bob-data:
  lnd-carol-data:
  lnd-dave-data:

networks:
  lnviz:
    driver: bridge
